services:
  postgres:
    image: postgres:16-alpine
    container_name: wcwiki-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wcwiki
      POSTGRES_PASSWORD: wcwiki
      POSTGRES_DB: wcwiki
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: wcwiki-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data

  # ── Staging PostgreSQL (for testing migrations before production) ──────────
  postgres-staging:
    image: postgres:16-alpine
    container_name: wcwiki-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: wcwiki
      POSTGRES_PASSWORD: wcwiki
      POSTGRES_DB: wcwiki_staging
    ports:
      - "5433:5432"
    volumes:
      - pgdata-staging:/var/lib/postgresql/data

volumes:
  pgdata:
  meilidata:
  pgdata-staging:
