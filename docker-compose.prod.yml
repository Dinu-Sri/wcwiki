services:
  # ── Next.js App ───────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wcwiki-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://wcwiki:${POSTGRES_PASSWORD}@postgres:5432/wcwiki?schema=public
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_API_KEY=${MEILI_MASTER_KEY}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NODE_ENV=production
      - UPLOAD_DIR=/app/uploads
      - CRON_SECRET=${CRON_SECRET}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
    networks:
      - wcwiki-net

  # ── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wcwiki-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wcwiki
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: wcwiki
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wcwiki"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wcwiki-net

  # ── Meilisearch ───────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: wcwiki-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meilidata:/meili_data
    networks:
      - wcwiki-net

  # ── Cloudflare Tunnel ─────────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: wcwiki-tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - wcwiki-net

volumes:
  pgdata:
  meilidata:
  uploads:

networks:
  wcwiki-net:
    driver: bridge
